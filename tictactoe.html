<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>

body{
text-align:center;
font-family:Arial;
}

.board{
width:300px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,100px);
gap:3px;
}

.cell{
width:100px;
height:100px;
background:#eee;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.win{
background:lightgreen;
}

button{
margin-top:20px;
padding:10px;
}

</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<h2 id="status">Player X Turn</h2>

<div class="board">

<div class="cell" id="c0"></div>
<div class="cell" id="c1"></div>
<div class="cell" id="c2"></div>

<div class="cell" id="c3"></div>
<div class="cell" id="c4"></div>
<div class="cell" id="c5"></div>

<div class="cell" id="c6"></div>
<div class="cell" id="c7"></div>
<div class="cell" id="c8"></div>

</div>

<button onclick="resetGame()">Reset Game</button>

<script src="tictac.js"></script>

</body>
</html>
